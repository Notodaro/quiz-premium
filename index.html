<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Czas na Quiz! - Empik Premium</title>
  <style>
    :root {
      --purple-bg: #8c7ae6; /* Fiolet z grafiki */
      --grid-color: rgba(255, 255, 255, 0.15);
      --window-header: #fbc531; /* Żółty z okienka */
      --window-body: #ffffff;
      --btn-yellow: #fceea7; /* Pastelowy żółty przycisków */
      --selected-green: #2ecc71; /* Neonowa zieleń po zaznaczeniu */
      --text-dark: #2f3640;
    }

    * { 
      box-sizing: border-box; 
      font-family: 'Montserrat', sans-serif, Arial;
    }

    body {
      margin: 0;
      background-color: var(--purple-bg);
      /* Generator idealnej kratki z tła grafiki */
      background-image: 
        linear-gradient(var(--grid-color) 2px, transparent 2px),
        linear-gradient(90deg, var(--grid-color) 2px, transparent 2px);
      background-size: 40px 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: var(--text-dark);
    }

    .wrap {
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    /* Wielki, trójwymiarowy nagłówek "QUIZ TIME" w wersji PL */
    .quiz-time-header {
      text-align: center;
      position: relative;
    }

    .quiz-time-header h1 {
      font-size: 3.5rem;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      margin: 0;
      letter-spacing: -1px;
      /* Efekt cienia jak na grafice */
      text-shadow: 
        3px 3px 0px #2f3640,
        -1px -1px 0px #2f3640,  
         1px -1px 0px #2f3640,
        -1px  1px 0px #2f3640,
         1px  1px 0px #2f3640;
    }

    /* Podkręcenie pierwszego słowa na biało */
    .quiz-time-header h1 span {
      color: #ffffff;
    }

    .quiz-time-header p.lead {
      color: #ffffff;
      font-size: 1rem;
      font-style: italic;
      margin: 10px 0 0 0;
      font-weight: 500;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    /* Okienko systemowe w stylu retro desktop */
    .window-card {
      background: var(--window-body);
      border: 3px solid #2f3640;
      border-radius: 20px;
      width: 100%;
      overflow: hidden;
      box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.25);
    }

    /* Pasek górny okienka */
    .window-top {
      background: var(--window-header);
      border-bottom: 3px solid #2f3640;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .window-circles {
      width: 16px;
      height: 16px;
      background: #2f3640;
      border-radius: 50%;
      position: relative;
    }

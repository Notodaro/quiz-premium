<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Czas na Quiz! - Empik Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-bg: #8c7ae6; 
      --grid-color: rgba(255, 255, 255, 0.15);
      --window-header: #DCA520; /* Twój konkretny żółty */
      --window-body: #ffffff;
      --btn-yellow: #fceea7; 
      --selected-green: #2ecc71; /* Soczysta zieleń */
      --text-dark: #000000;
      --text-white: #FFFFFF;
    }

    * { 
      box-sizing: border-box; 
      font-family: 'Montserrat', sans-serif;
    }

    body {
      margin: 0;
      background-color: var(--purple-bg);
      background-image: 
        linear-gradient(var(--grid-color) 2px, transparent 2px),
        linear-gradient(90deg, var(--grid-color) 2px, transparent 2px);
      background-size: 40px 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: var(--text-dark);
    }

    .wrap {
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Nagłówek (Stały prostokąt) */
    .header-box {
      text-align: center;
      width: 100%;
    }

      font-size: 2rem;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      margin: 0;
      text-shadow: 2px 2px 0px #000;
    }

      color: var(--text-white);
      font-size: 0.9rem;

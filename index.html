<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Którym benefitu Empik Premium dziś jesteś?</title>
    <style>
        :root {
            --bg-color: #f9f6f0;
            --card-bg: #ffffff;
            --text-color: #2b2b2b;
            --accent-color: #dcae1d;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background: var(--card-bg);
            max-width: 450px;
            width: 100%;
            border-radius: var(--border-radius);
            padding: 30px 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .question-box {
            display: none;
        }

        .question-box.active {
            display: block;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: left;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: none;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
            padding: 16px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1.4;
            color: var(--text-color);
        }

        .option-btn:hover {
            border-color: var(--text-color);
            background-color: #fafafa;
        }

        .start-btn {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 20px;
        }

        .start-btn:hover {
            opacity: 0.9;
        }

        .result-box {
            display: none;
            text-align: center;
        }

        .result-box.active {
            display: block;
        }

        .result-badge {
            font-size: 40px;
            margin-bottom: 16px;
        }

        .result-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-color);
        }

        .result-desc {
            font-size: 15px;
            color: #444;
            line-height: 1.6;
            text-align: left;
            background: #fdfdfd;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            margin-bottom: 24px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: var(--text-color);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="start-screen">
        <div style="font-size: 48px; margin-bottom: 16px;">💳✨</div>
        <h1>Którą korzyścią Empik Premium dziś jesteś?</h1>
        <p class="subtitle">Codziennie opowiadasz o nich klientom, ale pora sprawdzić, który benefit najlepiej oddaje Twój dzisiejszy vibe na salonie! Szybki test na przerwę.</p>
        <button class="start-btn" onclick="startQuiz()">Rozpocznij zabawę</button>
    </div>
